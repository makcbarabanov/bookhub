# book.islanddream.ru — BookHub v0.1 (FastAPI + Docker :8001)
#
# Активация:
#   sudo cp /home/makc/Projects/bookhub/nginx.conf /etc/nginx/sites-available/book.conf
#   sudo ln -sf /etc/nginx/sites-available/book.conf /etc/nginx/sites-enabled/book.conf
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d book.islanddream.ru

server {
    listen 80;
    listen [::]:80;
    server_name book.islanddream.ru;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
