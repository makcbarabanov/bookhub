# book.islanddream.ru — BookHub (FastAPI + Docker :8001)
#
# Активация:
#   sudo cp /home/makc/Projects/bookhub/nginx.conf /etc/nginx/sites-available/book.conf
#   sudo ln -sf /etc/nginx/sites-available/book.conf /etc/nginx/sites-enabled/book.conf
#   # Отключить старый лендинг «Ближний круг», если есть отдельный конфиг:
#   # sudo rm /etc/nginx/sites-enabled/blizhniy-krug.conf   (имя может отличаться)
#   sudo nginx -t && sudo systemctl reload nginx
#
# Если сертификата ещё нет:
#   sudo certbot --nginx -d book.islanddream.ru

server {
    listen 80;
    listen [::]:80;
    server_name book.islanddream.ru;

    client_max_body_size 50M;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name book.islanddream.ru;

    ssl_certificate /etc/letsencrypt/live/book.islanddream.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/book.islanddream.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_connect_timeout 180s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
